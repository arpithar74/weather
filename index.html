<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1 class="title">
            <i class="fas fa-cloud-sun"></i>
            Weather Dashboard
        </h1>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button id="searchBtn">
                    <i class="fas fa-search"></i>
                    Search
                </button>
            </div>
            <div class="search-history">
                <h3>Recent Searches</h3>
                <div id="historyList"></div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <!-- Current Weather Section -->
        <div id="currentWeather" class="weather-card hidden">
            <div class="weather-header">
                <h2 id="cityName"></h2>
                <p id="date"></p>
            </div>
            <div class="weather-main">
                <div class="temperature">
                    <span id="temp"></span>
                    <span class="unit">°C</span>
                </div>
                <div class="weather-info">
                    <img id="weatherIcon" src="" alt="Weather icon">
                    <p id="weatherDesc"></p>
                </div>
            </div>
            <div class="weather-details">
                <div class="detail">
                    <i class="fas fa-tint"></i>
                    <span>Humidity: <span id="humidity"></span>%</span>
                </div>
                <div class="detail">
                    <i class="fas fa-wind"></i>
                    <span>Wind: <span id="windSpeed"></span> km/h</span>
                </div>
                <div class="detail">
                    <i class="fas fa-temperature-low"></i>
                    <span>Feels like: <span id="feelsLike"></span>°C</span>
                </div>
            </div>
        </div>

        <!-- Forecast Section -->
        <div id="forecast" class="forecast-section hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
